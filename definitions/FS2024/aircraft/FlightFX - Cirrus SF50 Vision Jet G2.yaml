    type: var
    var_name: L:1:SF50_Engine_Starter_Button_Position
  -
    type: var
    var_name: L:1:SF50_Engine_Run_Knob_Position
  -
    type: CustomCalculator
    get: (L:1:SF50_Autothrottle_Status) 0 ==
    set: 0 (>K:AUTO_THROTTLE_DISCONNECT)
    condition:
      equals:
        F64: 1.0
  -
    type: CustomCalculator
    get: (L:1:SF50_Autothrottle_Status) 3 ==
    set: 0 (>K:AUTO_THROTTLE_ARM)
    condition:
      equals:
        F64: 1.0
