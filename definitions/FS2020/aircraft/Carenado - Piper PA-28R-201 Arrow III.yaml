shared:
  - # Deice
    type: NumSet
    var_name: A:PITOT HEAT SWITCH:1
    var_units: Bool
    var_type: i32
    event_name: PITOT_HEAT_SET
    event_param: 1
  -
    type: NumSet
    var_name: A:GENERAL ENG ANTI ICE POSITION:1
    var_units: Position 16k
    var_type: f64
    event_name: ANTI_ICE_GRADUAL_SET_ENG1
    use_calculator: true
    unreliable: true
  -
    type: NumSet
    var_name: A:GENERAL ENG ANTI ICE POSITION:2
    var_units: Position 16k
    var_type: f64
    event_name: ANTI_ICE_GRADUAL_SET_ENG2
    use_calculator: true
    unreliable: true
  -
    type: ToggleSwitch
    var_name: A:WINDSHIELD DEICE SWITCH
    var_units: Bool
    var_type: bool
    event_name: WINDSHIELD_DEICE_TOGGLE
    use_calculator: true

  - # Doors
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:0
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 1
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:1
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 2
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:3
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 4
    use_calculator: true

  - # Lights
    type: NumSet
    var_name: A:LIGHT LANDING:1
    var_units: Bool
    var_type: i32
    event_name: LANDING_LIGHTS_SET
    event_param: 1
    use_calculator: true
  -
