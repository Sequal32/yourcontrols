  -
    type: ToggleSwitch
    var_name: A:LIGHT TAXI
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_TAXI_LIGHTS
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:LIGHT RECOGNITION
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_RECOGNITION_LIGHTS
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:LIGHT BEACON
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_BEACON_LIGHTS
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:LIGHT STROBE
    var_units: Bool
    var_type: bool
    event_name: STROBES_TOGGLE
    use_calculator: true

