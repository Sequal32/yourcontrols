    var_units: Bool
    var_type: bool
  -
    type: event
    event_name: ALTERNATOR_ON
  -
    type: event
    event_name: ALTERNATOR_OFF
  -
    type: NumSet
    var_name: A:GENERAL ENG STARTER:1
