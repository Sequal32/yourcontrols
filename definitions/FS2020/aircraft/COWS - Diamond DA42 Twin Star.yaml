shared:
  - # AV Master
    type: ToggleSwitch
    var_name: A:CIRCUIT SWITCH ON:39
    var_units: Bool
    var_type: bool
    event_name: ELECTRICAL_CIRCUIT_TOGGLE
    event_param: 39
    use_calculator: true

  - # Deice
    type: NumSet
    var_name: A:PITOT HEAT SWITCH:1
    var_units: Bool
    var_type: i32
    event_name: PITOT_HEAT_SET
    event_param: 1

  - # Doors
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:2
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 3
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:3
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 4
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:6
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 7
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:7
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 8
    use_calculator: true

  - # Electrical
    type: ToggleSwitch
    var_name: A:ELECTRICAL MASTER BATTERY:1
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_MASTER_BATTERY
    event_param: 1
    use_calculator: true
  -
    type: CustomCalculator
    get: (L:STARTER_HOLD:1) 0 ==
    set: 0 (>L:STARTER_SPAD:1)
    condition:
      equals:
        F64: 1.0
  -
    type: CustomCalculator
    get: (L:STARTER_HOLD:1) 3 ==
    set: 1 (>L:STARTER_SPAD:1)
    condition:
      equals:
        F64: 1.0
  -
    type: CustomCalculator
    get: (L:STARTER_HOLD:2) 0 ==
    set: 0 (>L:STARTER_SPAD:2)
    condition:
      equals:
        F64: 1.0
  -
    type: CustomCalculator
    get: (L:STARTER_HOLD:2) 3 ==
    set: 1 (>L:STARTER_SPAD:2)
    condition:
      equals:
        F64: 1.0

  - # Engines
    type: ToggleSwitch
    var_name: A:RECIP ENG ENGINE MASTER SWITCH:1
    var_units: Bool
    var_type: bool
    event_name: ENGINE_MASTER_1_TOGGLE
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:RECIP ENG ENGINE MASTER SWITCH:2
    var_units: Bool
    var_type: bool
    event_name: ENGINE_MASTER_2_TOGGLE
    use_calculator: true

