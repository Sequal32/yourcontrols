# Version 1.1.5 (based on Asobo A320)

include:
  - definitions/FS2020/aircraft/Asobo Studio - Airbus A320neo.yaml

shared:
  - # 4L Cabin Door
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:6
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 7
    cancel_h_events: true
    use_calculator: true
  - # Bulk Cargo Door
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:7
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 8
    cancel_h_events: true
    use_calculator: true
  - # 2R Cabin Door
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:10
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 11
    cancel_h_events: true
    use_calculator: true
  - # 3R Cabin Door (stacked contact point)
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:11
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 12
    cancel_h_events: true
    use_calculator: true
  - # 3R Cabin Door (stacked contact point)
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:12
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 13
    cancel_h_events: true
    use_calculator: true

  - # APU BAT
    type: CustomCalculator
    get: 12 (>A:BUS LOOKUP INDEX, Number) (A:BUS CONNECTION ON:6, Bool)
    set: 6 12 (>K:2:ELECTRICAL_BUS_TO_BUS_CONNECTION_TOGGLE)
  - # EXT B
    type: NumSet
    var_name: A:EXTERNAL POWER ON:2
    var_units: Bool
    var_type: i32
    event_name: SET_EXTERNAL_POWER
    event_param: 2
    index_reversed: true
    use_calculator: true

  - # Fuel APU master
    type: ToggleSwitch
    var_name: A:FUELSYSTEM VALVE SWITCH:4
    var_units: Bool
    var_type: bool
    event_name: FUELSYSTEM_VALVE_TOGGLE
    event_param: 4
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:FUELSYSTEM VALVE SWITCH:5
    var_units: Bool
    var_type: bool
    event_name: FUELSYSTEM_VALVE_TOGGLE
    event_param: 5
    use_calculator: true

  - # Fuel APU start
    type: ToggleSwitch
    var_name: A:FUELSYSTEM PUMP SWITCH:9
    var_units: Bool
    var_type: bool
    event_name: FUELSYSTEM_PUMP_TOGGLE
    event_param: 9
    use_calculator: true

  - # Fuel OVHD center
    type: ToggleSwitch
    var_name: A:FUELSYSTEM PUMP SWITCH:7
    var_units: Bool
    var_type: bool
    event_name: FUELSYSTEM_PUMP_TOGGLE
    event_param: 7
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:FUELSYSTEM PUMP SWITCH:8
    var_units: Bool
    var_type: bool
    event_name: FUELSYSTEM_PUMP_TOGGLE
    event_param: 8
    use_calculator: true

  - # Fuel jettison
    type: ToggleSwitch
    var_name: A:FUELSYSTEM VALVE SWITCH:13
    var_units: Bool
    var_type: bool
    event_name: FUELSYSTEM_VALVE_TOGGLE
    event_param: 13
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:FUELSYSTEM VALVE SWITCH:14
    var_units: Bool
    var_type: bool
    event_name: FUELSYSTEM_VALVE_TOGGLE
    event_param: 14
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:FUELSYSTEM VALVE SWITCH:15
    var_units: Bool
    var_type: bool
    event_name: FUELSYSTEM_VALVE_TOGGLE
    event_param: 15
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:FUELSYSTEM VALVE SWITCH:16
    var_units: Bool
    var_type: bool
    event_name: FUELSYSTEM_VALVE_TOGGLE
    event_param: 16
    use_calculator: true

  - # Fuel Xfers
    type: ToggleSwitch
    var_name: A:FUELSYSTEM VALVE SWITCH:23
    var_units: Bool
    var_type: bool
    event_name: FUELSYSTEM_VALVE_TOGGLE
    event_param: 23
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:FUELSYSTEM VALVE SWITCH:24
    var_units: Bool
    var_type: bool
    event_name: FUELSYSTEM_VALVE_TOGGLE
    event_param: 24
    use_calculator: true

  - # Interior
    type: NumSet
    var_name: A:LIGHT CABIN:3
    var_units: Bool
    var_type: i32
    event_name: CABIN_LIGHTS_SET
    event_param: 3
    use_calculator: true
  -
    type: NumSet
    var_name: A:LIGHT CABIN:4
    var_units: Bool
    var_type: i32
    event_name: CABIN_LIGHTS_SET
    event_param: 4
    use_calculator: true
  -
    type: NumSet
    var_name: A:LIGHT CABIN:5
    var_units: Bool
    var_type: i32
    event_name: CABIN_LIGHTS_SET
    event_param: 5
    use_calculator: true
  -
    type: NumSet
    var_name: A:LIGHT CABIN:6
    var_units: Bool
    var_type: i32
    event_name: CABIN_LIGHTS_SET
    event_param: 6
    use_calculator: true

