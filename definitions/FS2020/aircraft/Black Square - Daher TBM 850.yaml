    var_name: A:CIRCUIT SWITCH ON:58
    var_units: Bool
    var_type: bool
    event_name: ELECTRICAL_CIRCUIT_TOGGLE
    event_param: 58
    use_calculator: true
  - # ADI2
    type: ToggleSwitch
    var_name: A:CIRCUIT SWITCH ON:59
    var_units: Bool
    var_type: bool
