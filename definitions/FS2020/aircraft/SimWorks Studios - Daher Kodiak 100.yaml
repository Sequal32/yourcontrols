shared:
  - # Avionics bus
    type: ToggleSwitch
    var_name: A:CIRCUIT SWITCH ON:30
    var_units: Bool
    var_type: bool
    event_name: ELECTRICAL_CIRCUIT_TOGGLE
    event_param: 30
    use_calculator: true

  - # Deice
    type: NumSet
    var_name: A:PITOT HEAT SWITCH:1
    var_units: Bool
    var_type: i32
    event_name: PITOT_HEAT_SET
    event_param: 1
  -
    type: NumSet
    var_name: A:PITOT HEAT SWITCH:2
    var_units: Bool
    var_type: i32
    event_name: PITOT_HEAT_SET
    event_param: 2
  -
    type: NumSet
    var_name: A:GENERAL ENG ANTI ICE POSITION:1
    var_units: Position 16k
    var_type: f64
    event_name: ANTI_ICE_GRADUAL_SET_ENG1
    use_calculator: true
    unreliable: true
  -
    type: ToggleSwitch
    var_name: A:STRUCTURAL DEICE SWITCH
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_STRUCTURAL_DEICE
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:WINDSHIELD DEICE SWITCH
    var_units: Bool
    var_type: bool
    event_name: WINDSHIELD_DEICE_TOGGLE
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:PROP DEICE SWITCH:1
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_PROPELLER_DEICE
    event_param: 1
    use_calculator: true

  - # Electrical
    type: ToggleSwitch
    var_name: A:ELECTRICAL MASTER BATTERY:1
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_MASTER_BATTERY
    event_param: 1
    use_calculator: true
  -
    type: NumSet
    var_name: A:GENERAL ENG MASTER ALTERNATOR:1
    var_units: Bool
    var_type: i32
    event_name: ALTERNATOR_SET
    event_param: 1
    use_calculator: true
  -
    type: NumSet
    var_name: A:GENERAL ENG MASTER ALTERNATOR:2
    var_units: Bool
    var_type: i32
    event_name: ALTERNATOR_SET
    event_param: 2
    use_calculator: true

  - # Engine
    type: NumSet
    var_name: A:GENERAL ENG PROPELLER LEVER POSITION:1
    var_units: Position 16k
    var_type: f64
    event_name: PROP_PITCH1_SET
    use_calculator: true
    unreliable: true
  -
    type: NumSet
    var_name: A:GENERAL ENG MIXTURE LEVER POSITION:1
    var_units: Position 16k
    var_type: f64
    event_name: MIXTURE1_SET
    use_calculator: true
    unreliable: true

  - # Fuel
    type: ToggleSwitch
    var_name: A:GENERAL ENG FUEL PUMP ON:1
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_ELECT_FUEL_PUMP1
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:GENERAL ENG FUEL VALVE:1
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_FUEL_VALVE_ENG1
    use_calculator: true

  - # Lights
    type: NumSet
    var_name: A:LIGHT BEACON:1
    var_units: Bool
    var_type: i32
    event_name: BEACON_LIGHTS_SET
    event_param: 1
    use_calculator: true
  -
    type: NumSet
    var_name: A:LIGHT STROBE:1
    var_units: Bool
    var_type: i32
    event_name: STROBES_SET
    event_param: 1
    use_calculator: true
  -
    type: NumSet
    var_name: A:LIGHT NAV:1
    var_units: Bool
    var_type: i32
    event_name: NAV_LIGHTS_SET
    event_param: 1
    use_calculator: true
  -
    type: NumSet
    var_name: A:LIGHT TAXI:1
    var_units: Bool
    var_type: i32
    event_name: TAXI_LIGHTS_SET
    event_param: 1
    use_calculator: true
  -
    type: NumSet
    var_name: A:LIGHT WING:1
    var_units: Bool
    var_type: i32
    event_name: WING_LIGHTS_SET
    event_param: 1
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:LIGHT RECOGNITION
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_RECOGNITION_LIGHTS
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:LIGHT LOGO
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_LOGO_LIGHTS
    use_calculator: true

  - # Interior
    type: NumSet
    var_name: A:LIGHT PANEL:1
    var_units: Bool
    var_type: i32
    event_name: PANEL_LIGHTS_SET
    event_param: 1
    use_calculator: true
  -
    type: NumSet
    var_name: A:LIGHT POTENTIOMETER:2
    var_units: Percent
    var_type: f64
    event_name: LIGHT_POTENTIOMETER_SET
    event_param: 2
    index_reversed: true
    use_calculator: true
  - # Reading light (doesn't move cause O var)
    type: NumSet
    var_name: A:LIGHT CABIN:3
    var_units: Bool
    var_type: i32
    event_name: CABIN_LIGHTS_SET
    event_param: 3
    use_calculator: true
  -
    type: NumSet
