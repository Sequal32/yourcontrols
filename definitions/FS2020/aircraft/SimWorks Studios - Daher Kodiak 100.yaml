    var_units: Bool
    var_type: i32
    event_name: PEDESTRAL_LIGHTS_SET
    event_param: 1
    use_calculator: true
  -
    type: NumSet
    var_name: A:LIGHT POTENTIOMETER:21
    var_units: Percent
    var_type: f64
    event_name: LIGHT_POTENTIOMETER_SET
    event_param: 21
    index_reversed: true
    use_calculator: true

  - # Pilot door handle
    type: CustomCalculator
    get: (Z:SWS_EXIT_Knob_Door_1) 0 ==
    set: 0 (>Z:SWS_EXIT_Knob_Door_1)
    condition:
      equals:
        F64: 1.0
  -
    type: CustomCalculator
    get: (Z:SWS_EXIT_Knob_Door_1) 1 ==
    set: 1 (>Z:SWS_EXIT_Knob_Door_1)
    condition:
      equals:
        F64: 1.0
  - # Pilot door
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:0
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 1
    use_calculator: true
  - # Copilot door handle
    type: CustomCalculator
    get: (Z:SWS_EXIT_Knob_Door_2) 0 ==
    set: 0 (>Z:SWS_EXIT_Knob_Door_2)
    condition:
      equals:
        F64: 1.0
  -
    type: CustomCalculator
    get: (Z:SWS_EXIT_Knob_Door_2) 1 ==
    set: 1 (>Z:SWS_EXIT_Knob_Door_2)
    condition:
      equals:
        F64: 1.0
  - # Copilot door
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:1
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 2
    use_calculator: true
  - # Storm window
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:2
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 3
    use_calculator: true
  - # Rear top door handle
    type: ToggleSwitch
    var_name: A:SMOKE ENABLE:3
    var_units: Bool
    var_type: bool
    event_name: SMOKE_TOGGLE
    event_param: 3
    use_calculator: true
  - # Rear top door
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:3
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 4
    use_calculator: true
  - # Rear bottom door handle
    type: ToggleSwitch
    var_name: A:SMOKE ENABLE:4
    var_units: Bool
    var_type: bool
    event_name: SMOKE_TOGGLE
    event_param: 4
    use_calculator: true
  - # Rear bottom door
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:4
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 5
    use_calculator: true
  - # Skydive door
    type: ToggleSwitch
    var_name: A:INTERACTIVE POINT GOAL:5
    var_units: Bool
    var_type: bool
    event_name: TOGGLE_AIRCRAFT_EXIT_FAST
    event_param: 6
    use_calculator: true

  - # Payload
    type: var
