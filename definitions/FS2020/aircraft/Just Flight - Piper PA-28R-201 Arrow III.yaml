shared:
  - # Autopilot
    type: ToggleSwitch
    var_name: A:AUTOPILOT ALTITUDE LOCK
    var_units: Bool
    var_type: bool
    event_name: AP_ALT_HOLD
    use_calculator: true
  -
    type: NumSet
    var_name: A:AUTOPILOT ALTITUDE LOCK VAR:1
    var_units: Feet
    var_type: i32
    event_name: AP_ALT_VAR_SET_ENGLISH
    event_param: 1
  -
    type: ToggleSwitch
    var_name: A:AUTOPILOT BACKCOURSE HOLD
    var_units: Bool
    var_type: bool
    event_name: AP_BC_HOLD
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:AUTOPILOT HEADING LOCK
    var_units: Bool
    var_type: bool
    event_name: AP_HDG_HOLD
    use_calculator: true
# - # Use workaround below
#   type: NumSet
#   var_name: A:AUTOPILOT HEADING LOCK DIR:1
#   var_units: Degrees
#   var_type: f64
#   event_name: HEADING_BUG_SET
#   event_param: 1
# - # Do not use
#   type: ToggleSwitch
#   var_name: A:AUTOPILOT MASTER
#   var_units: Bool
#   var_type: bool
#   event_name: AP_MASTER
#   use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:AUTOPILOT NAV1 LOCK
    var_units: Bool
    var_type: bool
    event_name: AP_NAV1_HOLD
    is_user_event: true
    use_calculator: true
  -
    type: ToggleSwitch
    var_name: A:AUTOPILOT VERTICAL HOLD
    var_units: Bool
    var_type: bool
    event_name: AP_VS_HOLD
    use_calculator: true
  -
    type: NumSet
    var_name: A:AUTOPILOT VERTICAL HOLD VAR:1
    var_units: Feet per minute
    var_type: i32
    event_name: AP_VS_VAR_SET_ENGLISH
    event_param: 1

  - # Deice
    type: NumSet
    var_name: A:GENERAL ENG ANTI ICE POSITION:1
    var_units: Position 16k
    var_type: f64
    event_name: ANTI_ICE_GRADUAL_SET_ENG1
    use_calculator: true
    unreliable: true

  - # Radios
    type: NumSet
    var_name: A:COM ACTIVE FREQUENCY:1
    var_units: Hz
    var_type: i32
    event_name: COM_RADIO_SET_HZ
    cancel_h_events: true
    use_calculator: true
  -
    type: NumSet
    var_name: A:COM ACTIVE FREQUENCY:2
    var_units: Hz
    var_type: i32
    event_name: COM2_RADIO_SET_HZ
    cancel_h_events: true
    use_calculator: true
  -
    type: NumSet
    var_name: A:COM STANDBY FREQUENCY:1
    var_units: Hz
    var_type: i32
    event_name: COM_STBY_RADIO_SET_HZ
    cancel_h_events: true
    use_calculator: true
  -
    type: NumSet
    var_name: A:COM STANDBY FREQUENCY:2
    var_units: Hz
    var_type: i32
    event_name: COM2_STBY_RADIO_SET_HZ
    cancel_h_events: true
    use_calculator: true
  -
    type: NumSet
    var_name: A:NAV ACTIVE FREQUENCY:1
    var_units: Hz
    var_type: i32
    event_name: NAV1_RADIO_SET_HZ
    cancel_h_events: true
    use_calculator: true
  -
    type: NumSet
    var_name: A:NAV ACTIVE FREQUENCY:2
    var_units: Hz
    var_type: i32
    event_name: NAV2_RADIO_SET_HZ
    cancel_h_events: true
    use_calculator: true
  -
    type: NumSet
    var_name: A:NAV ACTIVE FREQUENCY:3
    var_units: Hz
    var_type: i32
    event_name: NAV3_RADIO_SET_HZ
    cancel_h_events: true
    use_calculator: true
  -
    type: NumSet
    var_name: A:NAV STANDBY FREQUENCY:1
    var_units: Hz
    var_type: i32
    event_name: NAV1_STBY_SET_HZ
    cancel_h_events: true
    use_calculator: true
  -
    type: NumSet
    var_name: A:NAV STANDBY FREQUENCY:2
    var_units: Hz
    var_type: i32
    event_name: NAV2_STBY_SET_HZ
    cancel_h_events: true
    use_calculator: true

  - # Interior
    type: NumSet
    var_name: A:LIGHT CABIN:0
    var_units: Bool
    var_type: i32
    event_name: CABIN_LIGHTS_SET
    event_param: 0
    use_calculator: true
  -
    type: NumSet
    var_name: A:LIGHT POTENTIOMETER:10
    var_units: Percent
    var_type: f64
    event_name: LIGHT_POTENTIOMETER_SET
    event_param: 10
    index_reversed: true
    use_calculator: true

  - # Starter
    type: NumSet
    var_name: A:GENERAL ENG STARTER:1
    var_units: Bool
    var_type: i32
    event_name: SET_STARTER1_HELD
    use_calculator: true

  - # Transponder
    type: NumSet
    var_name: A:TRANSPONDER IDENT:1
    var_units: Bool
    var_type: i32
    event_name: XPNDR_IDENT_SET
    event_param: 1
  -
    type: NumSet
    var_name: A:TRANSPONDER CODE:1
    var_units: Bco16
    var_type: i32
    event_name: XPNDR_SET
    event_param: 1

