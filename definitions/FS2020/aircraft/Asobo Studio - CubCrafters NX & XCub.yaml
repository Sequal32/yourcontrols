# Version 0.1.107 X / 0.1.46 NX

include:
  - definitions/FS2020/modules/Instruments/WT_G3X_Touch.yaml
  - definitions/FS2020/modules/controls.yaml
  - definitions/FS2020/modules/electrical.yaml
  - definitions/FS2020/modules/engines.yaml
  - definitions/FS2020/modules/fuel.yaml
  - definitions/FS2020/modules/general.yaml
  - definitions/FS2020/modules/handling.yaml
  - definitions/FS2020/modules/navigation.yaml
  - definitions/FS2020/modules/payload.yaml
  - definitions/FS2020/modules/radios.yaml
  - definitions/FS2020/modules/safety.yaml
  - definitions/FS2020/modules/trim.yaml

shared:
  - # Deice
    type: NumSet
    var_name: A:GENERAL ENG ANTI ICE POSITION:1
    var_units: Position 16k
    var_type: f64
    event_name: ANTI_ICE_GRADUAL_SET_ENG1
    use_calculator: true
    unreliable: true

  - # Lights (no landing)
    type: NumSet
    var_name: A:LIGHT NAV:1
    var_units: Bool
    var_type: i32
    event_name: NAV_LIGHTS_SET
    event_param: 1
    use_calculator: true
  -
    type: NumSet
    var_name: A:LIGHT STROBE:1
    var_units: Bool
    var_type: i32
    event_name: STROBES_SET
    event_param: 1
    use_calculator: true

  - # Interior
    type: NumSet
    var_name: A:LIGHT PANEL:1
    var_units: Bool
    var_type: i32
    event_name: PANEL_LIGHTS_SET
    event_param: 1
    use_calculator: true
  -
    type: NumSet
    var_name: A:LIGHT POTENTIOMETER:3
    var_units: Percent
    var_type: f64
    event_name: LIGHT_POTENTIOMETER_SET
    event_param: 3
    index_reversed: true
    use_calculator: true
  -
    type: NumSet
    var_name: A:LIGHT GLARESHIELD:1
    var_units: Bool
    var_type: i32
    event_name: GLARESHIELD_LIGHTS_SET
    event_param: 1
    use_calculator: true
  -
    type: NumSet
    var_name: A:LIGHT POTENTIOMETER:2
    var_units: Percent
    var_type: f64
    event_name: LIGHT_POTENTIOMETER_SET
    event_param: 2
    index_reversed: true
    use_calculator: true

  - # Pulse light
    type: NumSet
    var_name: A:LIGHT POTENTIOMETER:7
    var_units: Percent
    var_type: f64
    event_name: LIGHT_POTENTIOMETER_SET
    event_param: 7
    index_reversed: true
    use_calculator: true
  -
    type: var
    var_name: L:LIGHTING_POTENTIOMETER_7