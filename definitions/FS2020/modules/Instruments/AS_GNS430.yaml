# Garmin GNS 430 by Asobo. Deprecated but variables are still used. Replaced by Working Title GNS 430W.

include:
  - definitions/FS2020/modules/Instruments/WT_GNS430.yaml

shared:
  -
    type: var
    var_name: L:AS430_HIDDEN
  -
    type: var
    var_name: L:AS430_MapZoomRange
  -
    type: var
    var_name: L:AS430_SelectedSource
  -
    type: var
    var_name: L:AS430_CDI_Source_1
  -
    type: var
    var_name: L:AS430_CDI_Source_2
  -
    type: var
    var_name: L:AS430_ManualBrightness_Value_1
  -
    type: var
    var_name: L:AS430_ManualBrightness_Value_2
  -
    type: var
    var_name: L:AS430_ManualBrightness_Enabled_1
  -
    type: var
    var_name: L:AS430_ManualBrightness_Enabled_2
  -
    type: var
    var_name: L:XMLVAR_GPS_DISABLED_AS430_1
  -
    type: var
    var_name: L:XMLVAR_GPS_DISABLED_AS430_2

ignore:
  - AS430_COMSWAP_Push
  - AS430_NAVSWAP_Push
  - AS430_LeftSmallKnob_Left
  - AS430_LeftSmallKnob_Right
  - AS430_LeftLargeKnob_Left
  - AS430_LeftLargeKnob_Right